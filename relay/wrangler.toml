name = "agent-mesh"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# KV namespace IDs are created by setup.sh — don't commit real IDs.
# Run ./setup.sh to populate these automatically.

[[kv_namespaces]]
binding = "AGENTS"
id = "YOUR_AGENTS_NAMESPACE_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_SESSIONS_NAMESPACE_ID"

[[kv_namespaces]]
binding = "MESSAGES"
id = "YOUR_MESSAGES_NAMESPACE_ID"

# The admin key is generated by setup.sh. Don't commit real keys.
# For production, use `wrangler secret put ADMIN_KEY` instead of [vars].
[vars]
ADMIN_KEY = "YOUR_ADMIN_KEY"
