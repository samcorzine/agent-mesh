# fly.toml app configuration file generated for agent-mesh-relay on 2026-04-05T02:27:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-mesh-relay'
primary_region = 'ord'

[build]

[env]
  PORT = '3000'

[[mounts]]
  source = 'relay_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
