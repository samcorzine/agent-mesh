<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1117">
  <title>Mesh Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="#/" class="logo">
        <span class="logo-dot"></span>
        <span>Mesh</span>
      </a>
      <div class="relay-status" id="relay-status" title="Relay status">
        <span class="dot"></span><span class="txt">connecting…</span>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="loading"><div class="spinner"></div></div>
  </main>

  <nav class="tabbar" aria-label="Main navigation">
    <a href="#/" class="tab" data-tab="overview">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span>Overview</span>
    </a>
    <a href="#/agents" class="tab" data-tab="agents">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Agents</span>
    </a>
    <a href="#/sessions" class="tab" data-tab="sessions">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span>Sessions</span>
    </a>
    <a href="#/invites" class="tab" data-tab="invites">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <span>Invites</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
